<!DOCTYPE html>
<html lang="en" data-theme="dracula">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lead Ops Intelligence</title>
<style>
/* ============================================================
   LEAD OPS INTELLIGENCE — Executive Command Center
   Themes: set data-theme on <html> — "dracula" (default),
   "command" (black/green), "industrial". Every color is a
   variable below; edit a block and the whole app follows.
   ============================================================ */
:root, html[data-theme="dracula"] {
  --bg: #0A0D19; --side: #0C1020; --surface: #12172A; --raised: #1A2038;
  --border: #242C4C; --hairline: #1B2240;
  --accent: #BD93F9;
  --c1: #BD93F9; --c2: #8BE9FD; --c3: #FF79C6; --c4: #FFB86C;
  --c5: #50FA7B; --c6: #6272A4;
  --good: #50FA7B; --warn: #FFB86C; --crit: #FF5555;
  --text: #F4F5FA; --muted: #8E94B4;
  --chip-hi-bg: rgba(255,85,85,.14); --chip-md-bg: rgba(255,184,108,.14);
}
html[data-theme="command"] {
  --bg: #080D0A; --side: #0A100C; --surface: #101813; --raised: #17231B;
  --border: #24402C; --hairline: #1A2B20;
  --accent: #6CC14C;
  --c1: #6CC14C; --c2: #9EDB8A; --c3: #F2B84B; --c4: #5FA8D3;
  --c5: #6CC14C; --c6: #55705C;
  --good: #6CC14C; --warn: #F2B84B; --crit: #E05A47;
  --text: #F3F7F1; --muted: #92A394;
  --chip-hi-bg: rgba(224,90,71,.16); --chip-md-bg: rgba(242,184,75,.14);
}
html[data-theme="industrial"] {
  --bg: #151719; --side: #191C1F; --surface: #202327; --raised: #2A2E33;
  --border: #3A4047; --hairline: #2C3136;
  --accent: #6CC14C;
  --c1: #6CC14C; --c2: #7A93A8; --c3: #D99A2B; --c4: #B57BD6;
  --c5: #6CC14C; --c6: #5B6169;
  --good: #6CC14C; --warn: #D99A2B; --crit: #E05A47;
  --text: #F2F3F4; --muted: #A5ABB3;
  --chip-hi-bg: rgba(224,90,71,.16); --chip-md-bg: rgba(217,154,43,.14);
}

/* ---------- base ---------- */
* { box-sizing: border-box; margin: 0; }
html { scroll-behavior: smooth; scrollbar-color: var(--border) var(--bg); }
body { background: var(--bg); color: var(--text);
  font: 13.5px/1.5 "Segoe UI", system-ui, -apple-system, sans-serif; }
.num { font-variant-numeric: tabular-nums; }
.micro { font-size: 10.5px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--muted); }
button, select { font: inherit; color: var(--text); background: var(--raised);
  border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }
select { padding: 6px 10px; }
button:hover, select:hover { border-color: var(--accent); }
a { color: var(--accent); text-decoration: none; }
svg { display: block; }
svg text { font-family: "Segoe UI", system-ui, sans-serif; }

/* ---------- app shell ---------- */
.app { display: grid; grid-template-columns: 216px minmax(0, 1fr); min-height: 100vh; }
.side { background: var(--side); border-right: 1px solid var(--hairline);
  padding: 18px 14px 20px; position: sticky; top: 0; height: 100vh;
  overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
.brandrow { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; }
.logo { width: 38px; height: 38px; border-radius: 10px; background: var(--raised);
  display: grid; place-items: center; border: 1px solid var(--border); flex: none; }
.logo svg { width: 20px; height: 20px; }
.brandrow h1 { font-size: 14.5px; font-weight: 700; line-height: 1.25; }
.brandrow .sub { font-size: 10.5px; color: var(--muted); }
.nav { display: flex; flex-direction: column; gap: 2px; }
.nav a { display: flex; align-items: center; gap: 10px; padding: 8px 10px;
  border-radius: 8px; color: var(--muted); font-size: 12.5px; font-weight: 600; }
.nav a svg { width: 15px; height: 15px; flex: none; }
.nav a:hover { background: var(--raised); color: var(--text); }
.nav a.on { background: var(--raised); color: var(--accent); }
.side-sec { margin-top: 18px; }
.side-sec .micro { display: block; margin-bottom: 8px; }
.swatches { display: flex; gap: 10px; }
.swatch { width: 44px; height: 52px; border-radius: 10px; padding: 6px 2px 4px;
  display: flex; flex-direction: column; align-items: center; gap: 4px; }
.swatch .ring { width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid transparent; }
.swatch span { font-size: 8px; color: var(--muted); font-weight: 600;
  white-space: nowrap; }
.swatch.on { border-color: var(--accent); }
.swatch.on .ring { border-color: var(--text); }
.healthbox { margin-top: 16px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 12px; padding: 14px 12px;
  text-align: center; }
.gauge { margin: 8px auto 4px; position: relative; width: 116px; height: 116px; }
.gauge .score { position: absolute; inset: 0; display: flex;
  flex-direction: column; align-items: center; justify-content: center; }
.gauge .score b { font-size: 30px; font-weight: 750; display: block; line-height: 1.05; }
.gauge .score i { font-style: normal; font-size: 11.5px; color: var(--muted); }
.healthbox .hdelta { font-size: 11.5px; margin-top: 4px; }
.hdelta.up { color: var(--good); } .hdelta.down { color: var(--crit); }
.hdelta.flat { color: var(--muted); }

/* ---------- content ---------- */
.content { padding: 14px clamp(14px, 2vw, 26px) 40px; min-width: 0; }
.filterbar { display: flex; flex-wrap: wrap; align-items: flex-end;
  gap: 10px 16px; padding-bottom: 14px; }
.fcol { display: flex; flex-direction: column; gap: 4px; }
.fcol .micro { letter-spacing: .06em; }
.daterange { display: flex; gap: 6px; }
.daterange input { font: inherit; font-size: 12.5px; color: var(--text);
  background: var(--raised); border: 1px solid var(--border);
  border-radius: 8px; padding: 5px 8px; color-scheme: dark; }
.daterange input:hover { border-color: var(--accent); }
.filterbar .grow { flex: 1; }
.updated { display: flex; align-items: center; gap: 8px; font-size: 11.5px;
  color: var(--muted); }
#refresh { width: 32px; height: 32px; border-radius: 8px; display: grid;
  place-items: center; }
#refresh svg { width: 15px; height: 15px; }

.card { background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; min-width: 0; }
.chead { display: flex; align-items: center; gap: 10px; padding: 13px 16px 0; }
.chead h2 { font-size: 13.5px; font-weight: 700; }
.chead .cap { font-size: 11px; color: var(--muted); }
.chead select { padding: 3px 8px; font-size: 11.5px; border-radius: 6px;
  margin-left: auto; }
.cbody { padding: 10px 16px 14px; }
.cbody > .micro { display: block; margin: 12px 0 5px; }
.scopechip { font-size: 10.5px; font-weight: 700; color: var(--accent);
  border: 1px solid var(--accent); border-radius: 20px; padding: 1px 8px; }

/* KPI strip */
.kpis { display: grid; gap: 10px;
  grid-template-columns: repeat(auto-fit, minmax(158px, 1fr)); }
.kpi { background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px 10px; min-width: 0; }
.kpi .top { display: flex; align-items: center; gap: 8px; }
.kpi .ico { width: 26px; height: 26px; border-radius: 7px; flex: none;
  display: grid; place-items: center; }
.kpi .ico svg { width: 14px; height: 14px; }
.kpi .lbl { font-size: 11.5px; color: var(--muted); font-weight: 600;
  line-height: 1.2; }
.kpi .v { font-size: 27px; font-weight: 750; margin-top: 6px; line-height: 1.1; }
.kpi .d { font-size: 11px; margin-top: 1px; min-height: 15px; }
.kpi .d.up { color: var(--good); } .kpi .d.down { color: var(--crit); }
.kpi .d.flat { color: var(--muted); }
.kpi .spark { margin-top: 6px; height: 26px; }

/* insight cards + alerts rail */
.midgrid { display: grid; grid-template-columns: minmax(0, 1fr) 300px;
  gap: 10px; margin-top: 10px; }
.midleft { display: flex; flex-direction: column; gap: 10px; min-width: 0; }
.insights { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px; }
.insight { background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 13px 15px; }
.insight .ihead { display: flex; align-items: center; gap: 8px;
  font-size: 12.5px; font-weight: 700; margin-bottom: 7px; }
.insight .ihead svg { width: 16px; height: 16px; }
.insight ul { list-style: none; }
.insight li { position: relative; padding: 2.5px 0 2.5px 13px; font-size: 12px;
  color: var(--text); }
.insight li::before { content: "•"; position: absolute; left: 0; }
.insight.wins li::before { color: var(--good); }
.insight.warns li::before { color: var(--warn); }
.insight p { font-size: 12px; margin-top: 3px; }
.alertcard .cbody { padding: 4px 10px 10px; }
.alertrow { display: flex; gap: 10px; padding: 10px 6px;
  border-top: 1px solid var(--hairline); align-items: flex-start; }
.alertrow:first-child { border-top: none; }
.alertrow svg { width: 15px; height: 15px; flex: none; margin-top: 1px; }
.alertrow .t { font-size: 12.5px; font-weight: 650; line-height: 1.3; }
.alertrow .x { font-size: 11.5px; color: var(--muted); margin-top: 1px; }
.sevchip { margin-left: auto; flex: none; font-size: 10.5px; font-weight: 700;
  border-radius: 6px; padding: 2px 8px; }
.sevchip.hi { color: var(--crit); background: var(--chip-hi-bg); }
.sevchip.md { color: var(--warn); background: var(--chip-md-bg); }
.sevchip.ok { color: var(--good); background: transparent; }
.viewall { font-size: 11px; font-weight: 700; margin-left: auto;
  background: none; border: none; color: var(--accent); }

/* chart row */
.charts { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px; }
.legend { display: flex; flex-wrap: wrap; gap: 3px 14px; padding: 6px 16px 0;
  font-size: 11px; color: var(--muted); }
.legend .key { display: inline-flex; align-items: center; gap: 6px; }
.legend .sw { width: 10px; height: 3px; border-radius: 2px; display: inline-block; }
.legend .sw.dash { background: repeating-linear-gradient(90deg,
  currentColor 0 3px, transparent 3px 5px); }

/* bottom row */
.botgrid { display: grid; gap: 10px; margin-top: 10px;
  grid-template-columns: minmax(0, 1.35fr) minmax(0, .9fr) minmax(0, 1fr); }
table.perf { width: 100%; border-collapse: collapse; font-size: 12px; }
table.perf th { text-align: right; color: var(--muted); font-weight: 700;
  font-size: 10.5px; letter-spacing: .06em; text-transform: uppercase;
  padding: 4px 8px 7px; border-bottom: 1px solid var(--hairline); }
table.perf th:first-child { text-align: left; }
table.perf td { padding: 8px; border-bottom: 1px solid var(--hairline);
  text-align: right; font-variant-numeric: tabular-nums; }
table.perf tr:last-child td { border-bottom: none; }
table.perf td:first-child { text-align: left; font-weight: 650; }
table.perf tr:hover td { background: var(--raised); }
.srcdot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  margin-right: 7px; }
.cfoot { border-top: 1px solid var(--hairline); padding: 9px 16px;
  font-size: 11.5px; font-weight: 650; text-align: center; }
.cfoot a { cursor: pointer; }
.donutwrap { display: flex; align-items: center; gap: 14px; padding: 6px 0; }
.donutwrap .center { position: absolute; inset: 0; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  text-align: center; }
.donutwrap .center b { font-size: 22px; font-weight: 750; display: block; }
.donutwrap .center i { font-style: normal; font-size: 10.5px; color: var(--muted); }
.dlegend { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.dlegend .row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.dlegend .row b { margin-left: auto; }
.dlegend .row i { font-style: normal; color: var(--muted); font-size: 11px;
  width: 42px; text-align: right; }
.formrow { display: grid; grid-template-columns: minmax(90px, 1.2fr) 44px
  minmax(60px, 1fr) 40px; align-items: center; gap: 10px; padding: 6.5px 0;
  border-bottom: 1px solid var(--hairline); font-size: 12px; }
.formrow:last-child { border-bottom: none; }
.formrow .fl { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.formrow .cnt { text-align: right; font-variant-numeric: tabular-nums;
  font-weight: 650; }
.formrow .track { height: 8px; background: var(--raised); border-radius: 4px;
  overflow: hidden; }
.formrow .bar { height: 100%; border-radius: 4px; }
.formrow .pctv { color: var(--muted); font-size: 11px; text-align: right; }
.scrollbox { max-height: 208px; overflow-y: auto; padding-right: 4px; }
.scrollbox::-webkit-scrollbar { width: 6px; }
.scrollbox::-webkit-scrollbar-track { background: transparent; }
.scrollbox::-webkit-scrollbar-thumb { background: var(--raised); border-radius: 3px; }

/* agents & teams */
.teamgrid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px; margin-top: 10px; }
table.mini { width: 100%; border-collapse: collapse; font-size: 12px; }
table.mini th { text-align: right; color: var(--muted); font-weight: 700;
  font-size: 10.5px; letter-spacing: .06em; text-transform: uppercase;
  padding: 3px 8px 6px; border-bottom: 1px solid var(--hairline); }
table.mini th:first-child { text-align: left; }
table.mini td { padding: 5.5px 8px; border-bottom: 1px solid var(--hairline);
  text-align: right; font-variant-numeric: tabular-nums; }
table.mini td:first-child { text-align: left; }
table.mini tr:hover td { background: var(--raised); }
table.mini tr:last-child td { border-bottom: none; }
.stdot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
.stdot.ok { background: var(--good); } .stdot.warn { background: var(--warn); }
.stdot.crit { background: var(--crit); }

.footnote { display: flex; align-items: center; gap: 8px; margin-top: 14px;
  background: var(--surface); border: 1px solid var(--hairline);
  border-radius: 10px; padding: 9px 14px; font-size: 11.5px;
  color: var(--muted); }
.empty { color: var(--muted); font-size: 12px; padding: 22px 0 16px;
  text-align: center; }

/* tooltip */
#tip { position: fixed; z-index: 50; pointer-events: none; display: none;
  background: var(--raised); border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 8px 22px rgba(0,0,0,.5); padding: 8px 11px; font-size: 12px;
  max-width: 280px; }
#tip .t { color: var(--muted); font-size: 10.5px; letter-spacing: .07em;
  text-transform: uppercase; margin-bottom: 4px; }
#tip .row { display: flex; align-items: center; gap: 7px; margin-top: 2px; }
#tip .k { width: 12px; height: 3px; border-radius: 2px; }
#tip .v { font-weight: 700; font-variant-numeric: tabular-nums; }
#tip .n { color: var(--muted); }

/* responsive */
@media (max-width: 1400px) { .charts { grid-template-columns: 1fr; }
  .botgrid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 1100px) { .midgrid { grid-template-columns: 1fr; }
  .insights { grid-template-columns: 1fr; }
  .botgrid, .teamgrid { grid-template-columns: 1fr; } }
@media (max-width: 900px) { .app { grid-template-columns: 1fr; }
  .side { position: static; height: auto; flex-direction: row;
    flex-wrap: wrap; align-items: center; }
  .nav, .healthbox { display: none; } .side-sec { margin: 0 0 0 auto; } }
</style>
</head>
<body>
<div class="app">
  <!-- ================= SIDEBAR ================= -->
  <aside class="side">
    <div class="brandrow">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">
        <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/></svg></div>
      <div><h1>Lead Ops Intelligence</h1><div class="sub">Executive Command Center</div></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="side-sec">
      <span class="micro">Theme switcher</span>
      <div class="swatches" id="swatches"></div>
    </div>
    <div class="healthbox" id="healthbox">
      <span class="micro">Lead ops health</span>
      <div class="gauge" id="gauge"></div>
      <div class="hdelta" id="hdelta"></div>
    </div>
  </aside>

  <!-- ================= MAIN ================= -->
  <main class="content">
    <div class="filterbar" id="filterbar"></div>
    <div id="app"></div>
    <div class="footnote" id="footnote"></div>
  </main>
</div>
<div id="tip"></div>

<script src="data.js"></script>
<script>
"use strict";
/* The whole app is deferred behind __LEADOPS_MAIN(); the unlock gate at the
   bottom of this file decrypts window.DASH_ENC (data.js is encrypted at
   rest) and then boots. Plaintext/sample data boots straight through. */
window.__LEADOPS_MAIN = function () {
/* ============================================================
   CONFIG — alert thresholds & behavior. Tune freely.
   ============================================================ */
const THRESHOLDS = {
  staleFeedWarnHrs: 12, staleFeedCritHrs: 24,

};

function icon(name, color, size) {
  const s = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  s.setAttribute("viewBox", "0 0 24 24"); s.setAttribute("fill", "none");
  s.setAttribute("stroke", color || "currentColor");
  s.setAttribute("stroke-width", "2"); s.setAttribute("stroke-linecap", "round");
  s.setAttribute("stroke-linejoin", "round");
  if (size) { s.style.width = size + "px"; s.style.height = size + "px"; }
  const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
  p.setAttribute("d", ICON[name]); s.appendChild(p); return s;
}

/* ============================================================
   THEMES — swatch buttons in the sidebar; persisted
   ============================================================ */
const THEMES = [

/* ============================================================
   Per-day helpers + weekly rollup for the chart dropdowns
   ============================================================ */
function trendWindow() {
  if (FILT.range === "custom") return rangeOf().days();
  if (FILT.range === "all") {
    const all = new Set();
    for (const r of [...A, ...AV, ...LC]) { const d = etDay(r.d); if (d) all.add(d); }
    const sorted = [...all].sort();
    return sorted.length ? sorted : lastDays(THRESHOLDS.trendDays);
  }
  return lastDays(THRESHOLDS.trendDays);
}
function dailyCounts(items, days, f) {
  const set = new Map(days.map(d => [d, 0]));
  for (const r of items) { const d = etDay(r.d);
    if (set.has(d) && (!f || f(r))) set.set(d, set.get(d) + 1); }
  return days.map(d => set.get(d));
}
function weekly(days, values, agg) {
  /* group by ISO-ish week (Mon start); agg: "sum" | "median-of-values" */
  const buckets = new Map();
  days.forEach((d, i) => {
    const dt = new Date(d + "T12:00:00");
    const wk = new Date(dt - ((dt.getDay() + 6) % 7) * 86400e3)
      .toISOString().slice(0, 10);
    if (!buckets.has(wk)) buckets.set(wk, []);
    if (values[i] != null) buckets.get(wk).push(values[i]);
  });
  const ks = [...buckets.keys()].sort();
  return { days: ks, values: ks.map(k => {
    const v = buckets.get(k);
    if (!v.length) return null;
    return agg === "median" ? Math.round(median(v)) : sum(v); }) };
}

/* ============================================================
   ALERT ENGINE — {sev:"crit"|"warn", title, detail, chip}
   ============================================================ */
function buildAlerts(a, aAll) {
  const out = [];
  const now = Date.now();
  [["Andersen", "andersen"], ["Avoca", "avoca"], ["LeadCertain", "leadcertain"]]
    .forEach(([name, key]) => {
      const newest = (D.boards[key] || {}).newest; if (!newest) return;
      const hrs = (now - new Date(newest.replace(" ", "T"))) / 3600e3;
      if (hrs > THRESHOLDS.staleFeedCritHrs)
        out.push({ sev: "crit", ack: ACKNOWLEDGED["feed:" + key],
          title: `${name} feed silent`, chip: Math.round(hrs) + "h",
          detail: "No new items — check the sync scheduled task." });
      else if (hrs > THRESHOLDS.staleFeedWarnHrs && key === "andersen")
        out.push({ sev: "warn", title: `${name} feed slowing`, chip: Math.round(hrs) + "h",
          detail: "Newest item is older than expected for this volume." });
    });
  const untouched = a.filter(r => r.ts === "Untouched");
  const aging = untouched.filter(r => businessMinutes(
    new Date(r.d.replace(" ", "T")), new Date(now))
    > THRESHOLDS.untouchedAgeAlertHrs * 60);
  if (aging.length)
    out.push({ sev: aging.length > 25 ? "crit" : "warn",
      title: `${aging.length} untouched lead${aging.length > 1 ? "s" : ""} aging`,
      chip: `>${THRESHOLDS.untouchedAgeAlertHrs}h`,
      detail: `No agent contact after ${THRESHOLDS.untouchedAgeAlertHrs} business hours — speed-to-lead risk.` });
  const dupTracked = a.filter(r => r.r === "Duplicate" && r.ts);
  const dupUn = dupTracked.filter(r => r.ts === "Untouched").length;
  if (dupTracked.length >= 10 && 100 * dupUn / dupTracked.length >= THRESHOLDS.dupUntouchedWarn)
    out.push({ sev: "warn", title: "Duplicate re-inquiries under-worked",
      chip: pct(dupUn, dupTracked.length),
      detail: `${dupUn} of ${dupTracked.length} duplicate re-inquiries have no agent action.` });
  /* duplicate spike vs trailing average — only days that HAVE data */
  const wkDays = lastDays(7, 1).filter(d => aAll.some(r => etDay(r.d) === d));
  const dupAvg = wkDays.length
    ? inRange(aAll, wkDays).filter(r => r.r === "Duplicate").length / wkDays.length : 0;
  const dupToday = inRange(aAll, lastDays(1)).filter(r => r.r === "Duplicate").length;
  if (wkDays.length >= 3 && dupAvg >= 5 && dupToday > dupAvg * THRESHOLDS.dupSpikeFactor)
    out.push({ sev: "warn", title: "Duplicate volume spiking", chip: `${dupToday} today`,
      detail: `vs ${Math.round(dupAvg)}/day trailing average.` });
  const st = new Map();
  for (const r of a) { const s = r.s || "?";
    if (!st.has(s)) st.set(s, { tracked: 0, touched: 0, mins: [] });
    const o = st.get(s);
    if (r.ts) o.tracked++;
    if (isTouched(r)) { o.touched++; const m = minsOf(r); if (m != null) o.mins.push(m); } }
  [...st].filter(([, o]) => o.tracked >= THRESHOLDS.minStoreVolume)
    .forEach(([s, o]) => {
      const tp = 100 * o.touched / o.tracked;
      const med = o.mins.length ? median(o.mins) : null;
      if (tp < THRESHOLDS.touchPctWarn)
        out.push({ sev: tp < 50 ? "crit" : "warn", ack: ACKNOWLEDGED["coverage:" + s],
          title: `${storeLabel(s)} coverage low`, chip: Math.round(tp) + "%",
          detail: `Only ${o.touched} of ${o.tracked} tracked leads touched.` });
      else if (med != null && med > THRESHOLDS.medMinsWarn)
        out.push({ sev: "warn", ack: ACKNOWLEDGED["slow:" + s],
          title: `${storeLabel(s)} touching slowly`,
          chip: Math.round(med) + "m",
          detail: `Median first-touch above the ${THRESHOLDS.medMinsWarn}-minute bar.` });
    });
  /* crit first, then warn; acknowledged conditions sink to the bottom */
  const rank = x => x.ack ? 2 : x.sev === "crit" ? 0 : 1;
  out.sort((x, y) => rank(x) - rank(y));
  return out;
}

/* ============================================================
   HEALTH SCORE — composite 0–100 from the current slice
   ============================================================ */
function healthScore(a, alerts) {
  const tracked = a.filter(r => r.ts).length;
  const un = a.filter(r => r.ts === "Untouched").length;
  const med = median(a.map(minsOf).filter(v => v != null));
  const live = alerts.filter(x => !x.ack);   // acknowledged ≠ unhealthy
  let s = 100;
  s -= live.filter(x => x.sev === "crit").length * 14;
  s -= live.filter(x => x.sev === "warn").length * 5;
  if (tracked) s -= Math.max(0, 100 * un / tracked - 10) * 0.6;
  if (med != null) s -= Math.max(0, med - 10) * 0.3;
  return Math.max(5, Math.min(100, Math.round(s)));
}

  h("h2", null, dh, "Touch Outcomes");

  const db = h("div", "cbody", dcard);

  if (!tracked.length) h("div", "empty", db, "No tracked leads in view");
  /* speed distribution under the donut (same agent scope) */
  const BUCKETS = [["≤5m", 5], ["6–15m", 15], ["16–30m", 30], ["31–60m", 60],
    ["1–4h", 240], [">4h", Infinity]];
  const minsArr = aT.map(minsOf).filter(v => v != null);
  if (minsArr.length) {
    h("div", "micro", db, "Speed-to-lead distribution");
    BUCKETS.forEach(([label, max], i) => {
      const v = minsArr.filter(x => x <= max && (i === 0 || x > BUCKETS[i - 1][1])).length;
      const row = h("div", "formrow", db);
      h("span", "fl", row, label);
      h("span", "cnt num", row, fmt(v));
      const track = h("div", "track", row);
      const bar = h("div", "bar", track);
      bar.style.width = Math.round(100 * v / Math.max(...BUCKETS.map(([l2, m2], j) =>
        minsArr.filter(x => x <= m2 && (j === 0 || x > BUCKETS[j - 1][1])).length), 1)) + "%";
      bar.style.background = C2;
      h("span", "pctv num", row, pct(v, minsArr.length));

  /* lead sources breakdown — primary sources, click to drill into subs */
  const scard = h("div", "card", bot); scard.id = "sec-forms";
  const sch = h("div", "chead", scard);
  h("h2", null, sch, "Lead Sources");
  h("span", "cap", sch, "Andersen · click a source for its sub-sources");
  const scb = h("div", "cbody", scard);
  const srcC = [...counter(a, r => r.src || "(none)")].sort((x, y) => y[1] - x[1]);
  const SCOLORS = [C1, C2, C3, C4, C5, C6];
  let srcExpanded = false;
  const openSrc = new Set();
  const drawSources = () => {
    scb.textContent = "";
    if (!srcC.length) { h("div", "empty", scb, "No data in view"); return; }
    const maxN = srcC[0][1];
    (srcExpanded ? srcC : srcC.slice(0, 8)).forEach(([label, n], i) => {
      const row = h("div", "formrow", scb);
      row.style.cursor = "pointer";
      row.title = "Show sub-sources";
      const fl = h("span", "fl", row, (openSrc.has(label) ? "▾ " : "▸ ") + label);
      fl.title = label;
      h("span", "cnt num", row, fmt(n));
      const track = h("div", "track", row);
      const bar = h("div", "bar", track);
      bar.style.width = Math.max(Math.round(100 * n / maxN), 2) + "%";
      bar.style.background = SCOLORS[i % SCOLORS.length];
      h("span", "pctv num", row, pct(n, a.length));
      row.addEventListener("click", () => {
        if (openSrc.has(label)) openSrc.delete(label); else openSrc.add(label);
        drawSources();
      });
      if (openSrc.has(label)) {
        const subs = [...counter(a.filter(r => (r.src || "(none)") === label),
          r => r.sub || "(none)")].sort((x, y) => y[1] - x[1]);
        subs.slice(0, 10).forEach(([sl, sn]) => {
          const srow = h("div", "formrow", scb);
          srow.style.paddingLeft = "18px";
          const sfl = h("span", "fl", srow, sl);
          sfl.title = sl; sfl.style.opacity = "0.75";
          h("span", "cnt num", srow, fmt(sn));
          const st = h("div", "track", srow);
          const sb2 = h("div", "bar", st);
          sb2.style.width = Math.max(Math.round(100 * sn / Math.max(subs[0][1], 1)), 2) + "%";
          sb2.style.background = SCOLORS[i % SCOLORS.length];
          sb2.style.opacity = "0.55";
          h("span", "pctv num", srow, pct(sn, n));
        });
        if (subs.length > 10)
          h("div", "micro", scb, `+${subs.length - 10} more sub-source(s)`);
      }
    });
  };
  drawSources();
  if (srcC.length > 8) {
    const sf = h("div", "cfoot", scard);
    const sfa = h("a", null, sf, "View all sources →");
    sfa.addEventListener("click", () => { srcExpanded = !srcExpanded;
      sfa.textContent = srcExpanded ? "Show top 8" : "View all sources →";
      drawSources(); });

  /* form types breakdown */
  const fcard = h("div", "card", bot); fcard.id = "sec-formtypes";
  const fh = h("div", "chead", fcard);
  h("h2", null, fh, "Form Types Breakdown");
  h("span", "cap", fh, "Andersen submissions");
  const fb = h("div", "cbody", fcard);
  const formC = [...counter(a, r => r.f || "(none)")].sort((x, y) => y[1] - x[1]);
  const FCOLORS = [C1, C2, C3, C4, C5, C6];
  let formsExpanded = false;
  const drawForms = () => {
    fb.textContent = "";
    if (!formC.length) { h("div", "empty", fb, "No data in view"); return; }
    const maxN = formC[0][1];
    (formsExpanded ? formC : formC.slice(0, 6)).forEach(([label, n], i) => {
      const row = h("div", "formrow", fb);
      const fl = h("span", "fl", row, label); fl.title = label;
      h("span", "cnt num", row, fmt(n));
      const track = h("div", "track", row);
      const bar = h("div", "bar", track);
      bar.style.width = Math.max(Math.round(100 * n / maxN), 2) + "%";
      bar.style.background = FCOLORS[i % FCOLORS.length];
      h("span", "pctv num", row, pct(n, a.length));

  drawForms();
  if (formC.length > 6) {
    const ff = h("div", "cfoot", fcard);
    const ffa = h("a", null, ff, "View all form types →");
    ffa.addEventListener("click", () => { formsExpanded = !formsExpanded;
      ffa.textContent = formsExpanded ? "Show top 6" : "View all form types →";
      drawForms(); });

  /* arrival window: in vs after company open hours (ET for all stores) */
  const awc = h("div", "card", bot); awc.id = "sec-arrival";
  const awh = h("div", "chead", awc);
  h("h2", null, awh, "Arrival Window");
  h("span", "cap", awh, "ET clock, all stores · M–F 8:00a–10:30p · S–S 9a–8p");
  const awb = h("div", "cbody", awc);

  const awOut = cnt(a, r => r.aw === "After Hours");

  else {
    [["In Hours", awIn, C2], ["After Hours", awOut, C4]].forEach(([label, n, color]) => {
      const row = h("div", "formrow", awb);
      h("span", "fl", row, label);
      h("span", "cnt num", row, fmt(n));
      const track = h("div", "track", row);
      const bar = h("div", "bar", track);
      bar.style.width = Math.max(Math.round(100 * n / Math.max(awIn, awOut, 1)), 2) + "%";
      bar.style.background = color;
      h("span", "pctv num", row, pct(n, awTot));
    });
    const awUn = w => { const t2 = a.filter(r => r.aw === w && r.ts);
      return t2.length ? pct(cnt(t2, r => r.ts === "Untouched"), t2.length) : "—"; };
    h("div", "micro", awb,
      `Untouched rate — in-hours ${awUn("In Hours")} · after-hours ${awUn("After Hours")}`);
    const awBlank = a.length - awTot;
    if (awBlank > 0)
      h("div", "micro", awb, `${fmt(awBlank)} unclassified (pre-column or date-only)`);
  }

  /* ---------- agents & teams ---------- */
  const team = h("div", "teamgrid", app); team.id = "sec-agents";
  /* agent leaderboard */
  const agc = h("div", "card", team);
  const agh = h("div", "chead", agc);
  h("h2", null, agh, "Agent Leaderboard");
  h("span", "cap", agh, "first touches credited · fresh + duplicates");
  const agb = h("div", "cbody", agc);
  const agents = new Map();
  for (const r of a) { if (!isTouched(r) || !r.by) continue;
    if (!agents.has(r.by)) agents.set(r.by, { touches: 0, appt: 0, mins: [] });
    const ag = agents.get(r.by); ag.touches++;
    if (r.ts === "Appt Set") ag.appt++;
    const m = minsOf(r); if (m != null) ag.mins.push(m); }
  const agRows = [...agents].sort((x, y) => y[1].touches - x[1].touches).slice(0, 12);
  if (agRows.length) {
    const at = h("table", "mini", agb);
    const atr = h("tr", null, h("thead", null, at));
    ["Agent", "Touches", "Appts Set", "Med Mins"].forEach(c2 => h("th", null, atr, c2));
    const atb = h("tbody", null, at);
    agRows.forEach(([name, ag]) => {
      const tr = h("tr", null, atb);
      h("td", null, tr, name.replace(/^@\w+ - /, ""));
      h("td", null, tr, fmt(ag.touches));
      h("td", null, tr, fmt(ag.appt));
      h("td", null, tr, ag.mins.length ? Math.round(median(ag.mins)) + "m" : "—");
    });
  } else h("div", "empty", agb, "No touches in view");
  /* store ranking */
  const stc = h("div", "card", team);
  const sth = h("div", "chead", stc);
  h("h2", null, sth, "Store Ranking");
  h("span", "cap", sth, "volume · coverage · speed");
  const stb = h("div", "cbody", stc);
  const stores = new Map();
  for (const r of a) { const s = r.s || "?";
    if (!stores.has(s)) stores.set(s, { total: 0, booked: 0, tracked: 0,
      touched: 0, mins: [] });
    const o = stores.get(s); o.total++;
    if (isBookedA(r)) o.booked++;
    if (r.ts) o.tracked++;
    if (isTouched(r)) { o.touched++; const m = minsOf(r); if (m != null) o.mins.push(m); } }
  const stRows = [...stores].sort((x, y) => y[1].total - x[1].total);
  if (stRows.length) {
    const st = h("table", "mini", stb);
    const str = h("tr", null, h("thead", null, st));
    ["Store", "Leads", "Booked", "Touch %", "Med Mins", ""].forEach(c2 => h("th", null, str, c2));
    const stbody = h("tbody", null, st);
    stRows.forEach(([s, o]) => {
      const tr = h("tr", null, stbody);
      h("td", null, tr, storeLabel(s));
      h("td", null, tr, fmt(o.total));
      h("td", null, tr, pct(o.booked, o.total));
      const tp = o.tracked ? Math.round(100 * o.touched / o.tracked) : null;
      h("td", null, tr, tp == null ? "—" : tp + "%");
      const med = o.mins.length ? median(o.mins) : null;
      h("td", null, tr, med == null ? "—" : Math.round(med) + "m");
      const tds = h("td", null, tr);
      const bad = (tp != null && tp < THRESHOLDS.touchPctWarn) ||
        (med != null && med > THRESHOLDS.medMinsWarn);
      h("span", "stdot " + (tp != null && tp < 50 ? "crit" : bad ? "warn" : "ok"), tds);
    });
  } else h("div", "empty", stb, "No data in view");

  /* ---------- footnote ---------- */
  const fn = document.getElementById("footnote");
  fn.textContent = "";
  fn.appendChild(icon("info", "currentColor", 14));
  fn.append(`Touch metrics are based on tracked leads (48 h tracking window). ` +
    `Wait times count working hours only — Mon–Fri 8:00a–10:30p, ` +
    `Sat–Sun 9:00a–8:00p ET; time outside these windows does not accrue. ` +
    `Showing ${rangeOf().label.toLowerCase()}` +
    (rangeOf().prevLabel ? `, compared to ${rangeOf().prevLabel}.` : `.`) +
    (LIVE ? ` Data refreshes every 15 min; page reloads every 5 min.`
      : ` SAMPLE DATA — data.js not found.`));
}

renderNav();
window.__booted = true;
render();
scrollSpy();
setTimeout(() => location.reload(), 5 * 60 * 1000);
};

/* ============================================================
   UNLOCK GATE — data.js is encrypted at rest (window.DASH_ENC,
   PBKDF2-SHA256 → AES-256-GCM, written by pull_data.py). Ask for
   the passphrase once per browser session; cache the derived key
   in sessionStorage so the 5-min auto-reload and 30-min data
   refreshes stay silent. Plaintext window.DASH (legacy) or no
   data at all (sample mode) boots without a prompt.
   ============================================================ */
(function () {
  const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const b64e = buf => btoa(String.fromCharCode(...new Uint8Array(buf)));
  let theKey = null;   // retained after a successful decrypt (stale refresh)
  /* Cache-busted refetch of data.js — GitHub Pages' CDN caches it for
     10 min, so a plain reload can keep serving the previous snapshot. A
     unique query string always reaches the origin. */
  async function freshEnc() {
    try {
      const r = await fetch("data.js?fresh=" + Date.now(), { cache: "reload" });
      if (!r.ok) return null;
      const t = await r.text();
      const i = t.indexOf("{"), j = t.lastIndexOf("}");
      return (i >= 0 && j > i) ? JSON.parse(t.slice(i, j + 1)) : null;
    } catch (e) { return null; }
  }
  const boot = async () => {
    /* A tab can sit locked for hours, and the CDN can serve stale files:
       if what we decrypted is old, pull the latest ciphertext past the
       cache and decrypt it with the key we already have. */
    try {
      const p = window.DASH && window.DASH.pulled_at;   // UTC "YYYY-MM-DD HH:MM"
      const age = p ? (Date.now() - new Date(p.replace(" ", "T") + ":00Z")) / 60000
                    : 0;
      if (age > 20 && theKey) {
        const ne = await freshEnc();
        if (ne && ne.ct && ne.nonce !== window.DASH_ENC.nonce) {
          const pt = await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: b64d(ne.nonce) }, theKey, b64d(ne.ct));
          window.DASH = JSON.parse(new TextDecoder().decode(pt));
        }
      }
    } catch (e) {}
    const l = document.getElementById("lockscreen");
    if (l) l.remove();
    window.__LEADOPS_MAIN();
  };
  const enc = window.DASH_ENC;
  if (!enc) { boot(); return; }

  const ov = document.createElement("div"); ov.id = "lockscreen";
  ov.style.cssText = "position:fixed;inset:0;z-index:9999;display:flex;" +
    "align-items:center;justify-content:center;background:#14161f;";
  ov.innerHTML =
    '<div style="width:320px;max-width:90vw;background:#1c1f2b;border:1px solid #333a4d;' +
    'border-radius:12px;padding:28px;font-family:system-ui,\'Segoe UI\',sans-serif;text-align:center;">' +
    '<div style="font-size:15px;font-weight:700;color:#e8eaf2;margin-bottom:2px;">Lead Ops Intelligence</div>' +
    '<div style="font-size:11px;color:#8b91a7;margin-bottom:18px;">Enter the dashboard passphrase</div>' +
    '<input id="lockpass" type="password" autocomplete="current-password" ' +
    'style="width:100%;box-sizing:border-box;background:#12141d;color:#e8eaf2;border:1px solid #333a4d;' +
    'border-radius:8px;padding:10px 12px;font-size:14px;outline:none;">' +
    '<button id="lockgo" style="width:100%;margin-top:10px;background:#5865f2;color:#fff;border:0;' +
    'border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;">Unlock</button>' +
    '<div id="lockmsg" style="font-size:11px;color:#e8747c;margin-top:10px;min-height:14px;"></div></div>';
  document.body.appendChild(ov);
  const inp = ov.querySelector("#lockpass"), btn = ov.querySelector("#lockgo"),
        msg = ov.querySelector("#lockmsg");

  async function decryptWith(key) {
    const pt = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv: b64d(enc.nonce) }, key, b64d(enc.ct));
    window.DASH = JSON.parse(new TextDecoder().decode(pt));
    theKey = key;
  }
  async function tryPass(pass) {
    const km = await crypto.subtle.importKey("raw",
      new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: b64d(enc.salt), iterations: enc.iter, hash: "SHA-256" },
      km, { name: "AES-GCM", length: 256 }, true, ["decrypt"]);
    await decryptWith(key);
    try { sessionStorage.setItem("leadops-key",
      b64e(await crypto.subtle.exportKey("raw", key)) + "|" + enc.salt);
    } catch (e) {}
  }
  async function tryCached() {
    let cached; try { cached = sessionStorage.getItem("leadops-key"); }
    catch (e) { return false; }
    if (!cached) return false;
    const [raw, salt] = cached.split("|");
    if (salt !== enc.salt) return false;   // passphrase/salt rotated
    try {
      const key = await crypto.subtle.importKey("raw", b64d(raw),
        { name: "AES-GCM" }, false, ["decrypt"]);
      await decryptWith(key);
      return true;
    } catch (e) { return false; }
  }
  async function submit() {
    msg.textContent = ""; btn.disabled = true;
    try { await tryPass(inp.value); boot(); }
    catch (e) { btn.disabled = false; inp.value = "";
      msg.textContent = "Wrong passphrase."; inp.focus(); }
  }
  btn.addEventListener("click", submit);
  inp.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
  /* The app's own 5-min reload only runs after unlock — keep a LOCKED tab
     fresh too, so unlocking hours later never shows old data. Holds off
     while a passphrase is being typed. */
  setTimeout(function tick() {
    if (!document.getElementById("lockscreen")) return;
    if (inp.value) { setTimeout(tick, 30000); return; }
    location.reload();
  }, 5 * 60 * 1000);
  if (!(window.crypto && crypto.subtle)) {
    msg.textContent = "This browser can't decrypt here (needs localhost or file://).";
    return;
  }
  tryCached().then(ok => { if (ok) boot(); else inp.focus(); });
})();
</script>
</body>
</html>
